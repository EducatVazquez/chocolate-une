<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main-content})}">
<head><title>Nueva Venta</title></head>
<body>
<th:block th:fragment="main-content">
<div class="p-8">
    <div class="flex items-center gap-4 mb-6">
        <a th:href="@{/sales}" class="text-choc-500 hover:text-choc-700 transition-colors text-sm">← Volver</a>
        <h1 class="text-3xl font-bold text-choc-800">Nueva Venta</h1>
    </div>

    <!-- Alert area -->
    <div id="alertArea" class="mb-6 hidden"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- LEFT: Product selector -->
        <div class="lg:col-span-2 space-y-6">

            <!-- Customer -->
            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="text-lg font-semibold text-choc-800 mb-4 flex items-center gap-2">
                    <span>👥</span> Cliente
                </h2>
                <select id="customerId" required
                        class="w-full border border-choc-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-choc-400 text-sm bg-white text-choc-700">
                    <option value="">Seleccionar cliente...</option>
                    <option th:each="c : ${customers.content}"
                            th:value="${c.id}"
                            th:text="${c.lastName + ', ' + c.firstName + '  (' + c.email + ')'}"></option>
                </select>
            </div>

            <!-- Product catalog -->
            <div class="bg-white rounded-2xl shadow p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-choc-800 flex items-center gap-2"><span>🍫</span> Catálogo de Chocolates</h2>
                    <input id="productSearch" type="text" placeholder="Buscar producto..."
                           oninput="filterProducts()"
                           class="border border-choc-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-choc-400 w-48"/>
                </div>
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-96 overflow-y-auto pr-1">
                    <div th:each="p : ${products}"
                         th:id="'prod-card-' + ${p.id}"
                         th:data-name="${p.name.toLowerCase()}"
                         th:data-prod-id="${p.id}"
                         th:data-prod-name="${p.name}"
                         th:data-price="${p.price}"
                         th:data-stock="${p.stock}"
                         class="border border-choc-100 rounded-xl p-4 hover:border-choc-300 hover:shadow-sm transition-all cursor-pointer"
                         onclick="addToCart(this.dataset.prodId, this.dataset.prodName, parseFloat(this.dataset.price), parseInt(this.dataset.stock))">
                        <div class="flex items-start justify-between gap-2">
                            <div class="flex-1">
                                <p class="font-medium text-choc-800 text-sm leading-tight" th:text="${p.name}"></p>
                                <p class="text-xs text-choc-400 mt-0.5" th:text="${p.categoryName}"></p>
                            </div>
                            <div class="text-right flex-shrink-0">
                                <p class="font-bold text-choc-600 font-mono text-sm"
                                   th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 2)}"></p>
                                <p class="text-xs mt-0.5"
                                   th:classappend="${p.stock < 10} ? 'text-red-500' : 'text-choc-400'"
                                   th:text="'Stock: ' + ${p.stock}"></p>
                            </div>
                        </div>
                        <div class="mt-3 flex items-center justify-between">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-choc-100 text-choc-600 font-medium">
                                Clic para agregar →
                            </span>
                            <span th:if="${p.stock == 0}"
                                  class="text-xs text-red-500 font-medium">Sin stock</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="text-lg font-semibold text-choc-800 mb-3">Notas del pedido</h2>
                <textarea id="notes" rows="2" placeholder="Observaciones, instrucciones de envío, etc."
                          class="w-full border border-choc-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-choc-400 text-sm resize-none"></textarea>
            </div>
        </div>

        <!-- RIGHT: Cart -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow sticky top-6">
                <div class="p-6 border-b border-choc-100">
                    <h2 class="text-lg font-semibold text-choc-800 flex items-center gap-2">
                        🛒 Carrito
                        <span id="cartCount" class="ml-auto bg-choc-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                    </h2>
                </div>

                <!-- Cart items -->
                <div id="cartItems" class="p-4 space-y-3 min-h-32 max-h-80 overflow-y-auto">
                    <p id="emptyCart" class="text-center text-choc-400 text-sm py-8">El carrito está vacío</p>
                </div>

                <!-- Total -->
                <div class="p-6 border-t border-choc-100">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-bold text-choc-800 text-lg">Total</span>
                        <span id="cartTotal" class="font-mono font-bold text-2xl text-choc-600">$0.00</span>
                    </div>
                    <button onclick="processCheckout()"
                            class="w-full py-3 bg-choc-600 text-white rounded-xl hover:bg-choc-700 transition-colors font-semibold text-sm flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        ✓ Confirmar Pedido
                    </button>
                    <button onclick="clearCart()"
                            class="w-full py-2 mt-2 bg-choc-50 text-choc-500 rounded-xl hover:bg-choc-100 transition-colors text-sm">
                        Vaciar carrito
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const cart = {};

    function filterProducts() {
        const q = document.getElementById('productSearch').value.toLowerCase();
        document.querySelectorAll('#productGrid > div').forEach(card => {
            const name = card.getAttribute('data-name') || '';
            card.style.display = name.includes(q) ? '' : 'none';
        });
    }

    function addToCart(id, name, price, stock) {
        if (stock === 0) { showAlert('Sin stock disponible para "' + name + '"', 'red'); return; }
        if (cart[id]) {
            if (cart[id].qty >= stock) { showAlert('No hay más unidades disponibles de "' + name + '"', 'red'); return; }
            cart[id].qty++;
        } else {
            cart[id] = { name, price, qty: 1, stock };
        }
        renderCart();
    }

    function changeQty(id, delta) {
        if (!cart[id]) return;
        cart[id].qty += delta;
        if (cart[id].qty <= 0) { delete cart[id]; }
        else if (cart[id].qty > cart[id].stock) { cart[id].qty = cart[id].stock; }
        renderCart();
    }

    function removeFromCart(id) { delete cart[id]; renderCart(); }

    function clearCart() { Object.keys(cart).forEach(k => delete cart[k]); renderCart(); }

    function renderCart() {
        const container = document.getElementById('cartItems');
        const emptyMsg  = document.getElementById('emptyCart');
        const keys = Object.keys(cart);

        if (keys.length === 0) {
            container.innerHTML = '<p id="emptyCart" class="text-center text-choc-400 text-sm py-8">El carrito está vacío</p>';
            document.getElementById('cartCount').textContent = '0';
            document.getElementById('cartTotal').textContent = '$0.00';
            return;
        }

        let total = 0;
        let html = '';
        let count = 0;
        for (const id of keys) {
            const item = cart[id];
            const sub  = item.price * item.qty;
            total += sub;
            count += item.qty;
            html += `
            <div class="flex items-start gap-2 p-3 bg-choc-50 rounded-xl">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-choc-800 truncate">${item.name}</p>
                    <p class="text-xs text-choc-500 mt-0.5 font-mono">$${item.price.toFixed(2)} c/u</p>
                </div>
                <div class="flex items-center gap-1 flex-shrink-0">
                    <button onclick="changeQty(${id}, -1)"
                            class="w-6 h-6 rounded-full bg-choc-200 text-choc-700 hover:bg-choc-300 font-bold text-sm flex items-center justify-center">−</button>
                    <span class="w-6 text-center font-bold text-sm text-choc-800">${item.qty}</span>
                    <button onclick="changeQty(${id}, 1)"
                            class="w-6 h-6 rounded-full bg-choc-200 text-choc-700 hover:bg-choc-300 font-bold text-sm flex items-center justify-center">+</button>
                </div>
                <div class="flex-shrink-0 text-right">
                    <p class="font-mono font-bold text-choc-700 text-sm">$${sub.toFixed(2)}</p>
                    <button onclick="removeFromCart(${id})" class="text-xs text-red-400 hover:text-red-600 mt-0.5">Quitar</button>
                </div>
            </div>`;
        }
        container.innerHTML = html;
        document.getElementById('cartCount').textContent = String(count);
        document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
    }

    async function processCheckout() {
        const customerId = document.getElementById('customerId').value;
        if (!customerId) { showAlert('Por favor seleccioná un cliente.', 'yellow'); return; }
        if (Object.keys(cart).length === 0) { showAlert('El carrito está vacío.', 'yellow'); return; }

        const details = Object.entries(cart).map(([productId, item]) => ({
            productId: parseInt(productId),
            quantity:  item.qty
        }));

        const body = {
            customerId: parseInt(customerId),
            details,
            notes: document.getElementById('notes').value
        };

        try {
            const res = await fetch('/api/sales/checkout', {
                method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
            });
            const data = await res.json();

            if (res.ok) {
                showAlert(
                    `✅ Venta #${data.id} registrada correctamente. Total: $${parseFloat(data.total).toFixed(2)}`,
                    'green'
                );
                clearCart();
                document.getElementById('customerId').value = '';
                document.getElementById('notes').value = '';
                setTimeout(() => window.location.href = `/sales/${data.id}`, 2000);
            } else if (res.status === 409) {
                const detail = data.message;
                showAlert(`⚠️ Stock insuficiente: ${detail.message || JSON.stringify(detail)}`, 'red');
            } else {
                showAlert(`❌ Error: ${data.message || 'No se pudo procesar la venta.'}`, 'red');
            }
        } catch (err) {
            showAlert('❌ Error de conexión. Intente nuevamente.', 'red');
        }
    }

    function showAlert(msg, color) {
        const colorMap = {
            green:  'bg-green-50 border-green-200 text-green-800',
            red:    'bg-red-50 border-red-200 text-red-800',
            yellow: 'bg-yellow-50 border-yellow-200 text-yellow-800'
        };
        const area = document.getElementById('alertArea');
        area.className = `mb-6 p-4 rounded-xl border font-medium text-sm ${colorMap[color] || colorMap.yellow}`;
        area.textContent = msg;
        area.classList.remove('hidden');
        if (color !== 'green') return;
        setTimeout(() => area.classList.add('hidden'), 5000);
    }
</script>
</th:block>
</body>
</html>
