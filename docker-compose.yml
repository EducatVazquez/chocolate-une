services:
  postgres:
    image: postgres:16-alpine
    container_name: chocolateria_db
    environment:
      POSTGRES_DB: chocolateriadb
      POSTGRES_USER: chocolateria
      POSTGRES_PASSWORD: chocolateria123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chocolateria -d chocolateriadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chocolateria_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chocolateriadb
      SPRING_DATASOURCE_USERNAME: chocolateria
      SPRING_DATASOURCE_PASSWORD: chocolateria123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
